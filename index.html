<div id="fiq-chat" style="position:fixed;bottom:0;left:0;right:0;height:100vh;background:#0a0a0a;display:flex;flex-direction:column;font-family:'DM Sans',sans-serif;z-index:9999;">

  <!-- HEADER -->
  <div style="background:#111;border-bottom:1px solid #222;padding:16px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0;">
    <div style="width:42px;height:42px;background:#00FF87;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#0a0a0a;">IQ</div>
    <div>
      <div style="font-size:15px;font-weight:700;color:#f5f5f0;">FootballIQ Copiloto</div>
      <div style="font-size:12px;color:#00FF87;display:flex;align-items:center;gap:5px;margin-top:2px;">
        <div style="width:7px;height:7px;background:#00FF87;border-radius:50%;"></div>
        Online agora
      </div>
    </div>
    <div style="margin-left:auto;font-size:11px;color:#444;letter-spacing:1px;">FPL · LaLiga · Liga PT</div>
  </div>

  <!-- MENSAGENS -->
  <div id="fiq-messages" style="flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:16px;">
    <div style="background:rgba(0,255,135,0.06);border:1px solid rgba(0,255,135,0.15);border-radius:16px;border-top-left-radius:4px;padding:16px 18px;max-width:85%;">
      <p style="font-size:14px;color:#f5f5f0;line-height:1.6;">
        Olá! Sou o <strong style="color:#00FF87;">FootballIQ</strong>, o teu copiloto de Fantasy Football.<br><br>
        Posso ajudar-te com recomendações de capitão, transferências, análise da tua equipa e muito mais.<br><br>
        <strong style="color:#00FF87;">Faz-me uma pergunta sobre a tua equipa!</strong>
      </p>
    </div>
  </div>

  <!-- SUGESTÕES -->
  <div id="fiq-suggestions" style="padding:0 20px 12px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;">
    <button onclick="fiqSuggest(this)" style="background:#111;border:1px solid #2a2a2a;color:#888;font-size:12px;padding:7px 12px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;">Quem deve ser o meu capitão?</button>
    <button onclick="fiqSuggest(this)" style="background:#111;border:1px solid #2a2a2a;color:#888;font-size:12px;padding:7px 12px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;">Devo ativar o Wildcard?</button>
    <button onclick="fiqSuggest(this)" style="background:#111;border:1px solid #2a2a2a;color:#888;font-size:12px;padding:7px 12px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;">Melhores jogadores abaixo de 6M?</button>
    <button onclick="fiqSuggest(this)" style="background:#111;border:1px solid #2a2a2a;color:#888;font-size:12px;padding:7px 12px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;">Análise da minha equipa</button>
  </div>

  <!-- INPUT -->
  <div style="padding:12px 20px 24px;border-top:1px solid #1a1a1a;flex-shrink:0;">
    <div style="display:flex;gap:10px;align-items:center;">
      <input
        id="fiq-input"
        type="text"
        placeholder="Faz uma pergunta sobre a tua equipa..."
        onkeydown="if(event.key==='Enter') fiqSend()"
        style="flex:1;background:#111;border:1px solid #2a2a2a;color:#f5f5f0;padding:14px 18px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;"
      />
      <button
        onclick="fiqSend()"
        style="width:46px;height:46px;background:#00FF87;border:none;border-radius:12px;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"
      >➤</button>
    </div>
  </div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// https://hook.eu1.make.com/9rik5kh1upaa53hicyy4s3o3gvd4mhtg
const FIQ_WEBHOOK = 'https://hook.eu1.make.com/9rik5kh1upaa53hicyy4s3o3gvd4mhtg';
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function fiqSuggest(btn) {
  document.getElementById('fiq-input').value = btn.textContent;
  fiqSend();
}

function fiqAddMsg(text, isUser) {
  const box = document.getElementById('fiq-messages');
  const wrap = document.createElement('div');
  wrap.style.cssText = isUser
    ? 'align-self:flex-end;max-width:75%;'
    : 'display:flex;gap:10px;align-items:flex-start;max-width:85%;';

  if (isUser) {
    wrap.innerHTML = `<div style="background:#1e1e1e;border:1px solid #2a2a2a;color:#f5f5f0;padding:12px 16px;border-radius:16px;border-bottom-right-radius:4px;font-size:14px;line-height:1.5;">${text}</div>`;
  } else {
    wrap.innerHTML = `
      <div style="width:30px;height:30px;background:#00FF87;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#0a0a0a;flex-shrink:0;">IQ</div>
      <div style="background:rgba(0,255,135,0.06);border:1px solid rgba(0,255,135,0.15);color:#f5f5f0;padding:12px 16px;border-radius:16px;border-top-left-radius:4px;font-size:14px;line-height:1.6;">${text.replace(/\*\*(.*?)\*\*/g,'<strong style="color:#00FF87;">$1</strong>').replace(/\n/g,'<br>')}</div>
    `;
  }
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
  return wrap;
}

function fiqTyping() {
  const box = document.getElementById('fiq-messages');
  const wrap = document.createElement('div');
  wrap.id = 'fiq-typing';
  wrap.style.cssText = 'display:flex;gap:10px;align-items:flex-start;';
  wrap.innerHTML = `
    <div style="width:30px;height:30px;background:#00FF87;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#0a0a0a;flex-shrink:0;">IQ</div>
    <div style="background:rgba(0,255,135,0.06);border:1px solid rgba(0,255,135,0.15);padding:14px 18px;border-radius:16px;border-top-left-radius:4px;display:flex;gap:5px;align-items:center;">
      <div style="width:7px;height:7px;background:#00FF87;border-radius:50%;animation:fiqDot 1.2s infinite;opacity:0.4;"></div>
      <div style="width:7px;height:7px;background:#00FF87;border-radius:50%;animation:fiqDot 1.2s 0.2s infinite;opacity:0.4;"></div>
      <div style="width:7px;height:7px;background:#00FF87;border-radius:50%;animation:fiqDot 1.2s 0.4s infinite;opacity:0.4;"></div>
    </div>
  `;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

// CSS para animação dos pontos
const fiqStyle = document.createElement('style');
fiqStyle.textContent = `@keyframes fiqDot { 0%,100%{opacity:.4;transform:translateY(0)} 50%{opacity:1;transform:translateY(-3px)} }`;
document.head.appendChild(fiqStyle);

async function fiqSend() {
  const input = document.getElementById('fiq-input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  document.getElementById('fiq-suggestions').style.display = 'none';
  fiqAddMsg(msg, true);
  fiqTyping();

  try {
   const res = await fetch(FIQ_WEBHOOK, {
  method: 'POST',
  mode: 'no-cors',
  headers: { 'Content-Type': 'text/plain' },
  body: JSON.stringify({
        user_id: 'user_001',
        message: msg,
        team: ['Salah', 'Haaland', 'Palmer'],
        liga: 'fpl'
      })
    });

    const data = await res.json();
    document.getElementById('fiq-typing')?.remove();

    const reply = data.response
      || data.content?.[0]?.text
      || data.message
      || 'Não consegui processar. Tenta novamente.';

    fiqAddMsg(reply, false);

  } catch(e) {
    document.getElementById('fiq-typing')?.remove();
    fiqAddMsg('Erro de ligação. Verifica a tua conexão e tenta novamente.', false);
  }
}
</script>
